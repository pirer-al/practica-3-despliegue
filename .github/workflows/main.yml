name: Practica 3
on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5.2.0
        with:
            java-version: '17'
            distribution: 'temurin'
            cache: maven
      - run: mvn -B package --file pom.xml
          
